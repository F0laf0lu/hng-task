[tool.black]
line-length = 100
target-version = ['py312', 'py313']
include = '\.pyi?$'
extend-exclude = '''
/(
  # Exclude these directories

  | migrations
  | venv
  | env

  | .venv
  | .git
  | __pycache__

  | build
  | dist
)/
'''


[tool.isort]
profile = "django"
combine_as_imports = true
include_trailing_comma = true
line_length = 88
multi_line_output = 3
known_first_party = ["config"]
